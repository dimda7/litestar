<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Litestar App{% endblock %}</title>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
        function appendCsrfToken(formData) {
            formData.append('_csrf_token', document.querySelector('meta[name="csrf-token"]').content);
            return formData;
        }
    </script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="28" height="28" rx="6" fill="#1976d2"/>
                <path d="M8 10h12v2H8zm0 4h12v2H8zm0 4h8v2H8z" fill="white"/>
            </svg>
            <span>Litestar App</span>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if active_page == 'home' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>Главная</span>
            </a>
            <a href="/parser" class="nav-item {% if active_page == 'parser' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
                    <path d="M8 15h8v2H8zm0-4h8v2H8z"/>
                </svg>
                <span>Парсинг моделей</span>
            </a>
            <a href="/train-parser" class="nav-item {% if active_page == 'train_parser' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2c-4 0-8 .5-8 4v9.5C4 17.43 5.57 19 7.5 19L6 20.5v.5h12v-.5L16.5 19c1.93 0 3.5-1.57 3.5-3.5V6c0-3.5-3.58-4-8-4zM7.5 17c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm3.5-6H6V6h5v5zm2 0V6h5v5h-5zm3.5 6c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                </svg>
                <span>Парсинг поездов</span>
            </a>
            <a href="/design-number-parser" class="nav-item {% if active_page == 'design_number_parser' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
                    <path d="M9 13h6v2H9zm0-4h6v2H9zm0 8h4v2H9z"/>
                </svg>
                <span>Парсинг ТМЦ</span>
            </a>
            <a href="/actives-parser" class="nav-item {% if active_page == 'actives_parser' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
                    <path d="M9 12h2v2H9zm4 0h2v2h-2zM9 16h6v2H9z"/>
                </svg>
                <span>Парсинг активов</span>
            </a>
            <a href="/sql-console" class="nav-item {% if active_page == 'sql_console' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"/>
                    <path d="M6 10l3 2-3 2v-4zm4 3h5v1h-5z"/>
                </svg>
                <span>Выполнить SQL скрипт</span>
            </a>
            <a href="/users" class="nav-item {% if active_page == 'users' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <span>Пользователи</span>
            </a>
            <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                <span>Настройки</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            {% if user_id %}
            <a href="/auth/logout" class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                <span>Выход</span>
            </a>
            {% else %}
            <a href="/auth/login" class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 4zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
                <span>Вход</span>
            </a>
            {% endif %}
        </div>
    </aside>

    <main class="main-content">
        {% if user_id %}
        <div style="display: flex; justify-content: flex-end; align-items: center; gap: 16px; margin-bottom: 16px;">
            <span id="datetime" style="color: var(--text-secondary); font-size: 14px;"></span>
            <div title="Текущее подключение к БД" style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-card); border-radius: var(--radius-sm); box-shadow: var(--shadow);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--accent)">
                    <path d="M12 3C7.58 3 4 4.79 4 7s3.58 4 8 4 8-1.79 8-4-3.58-4-8-4zM4 9v3c0 2.21 3.58 4 8 4s8-1.79 8-4V9c0 2.21-3.58 4-8 4s-8-1.79-8-4zm0 5v3c0 2.21 3.58 4 8 4s8-1.79 8-4v-3c0 2.21-3.58 4-8 4s-8-1.79-8-4z"/>
                </svg>
                <span style="color: var(--text-primary); font-size: 14px; font-weight: 500;">{{ current_db_label() }}</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-card); border-radius: var(--radius-sm); box-shadow: var(--shadow);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent)">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span style="color: var(--text-primary); font-size: 14px; font-weight: 500;">{{ fullname }}</span>
            </div>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const formatted = now.toLocaleString('ru-RU', options);
            document.getElementById('datetime').textContent = formatted;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
