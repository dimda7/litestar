{% extends "base.html" %}

{% block title %}Настройки{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Настройки</h1>
    <p class="page-subtitle">Управление внешним видом и параметрами приложения</p>
</div>

<div class="card" style="max-width: 600px; margin-bottom: 24px;">
    <h3 style="margin-bottom: 8px; font-size: 16px; font-weight: 500;">Подключение к базе данных</h3>
    <p style="margin: 0 0 20px; font-size: 13px; color: var(--text-secondary);">
        Текущее подключение: <strong id="active-db-label" style="color: var(--text-primary);">{{ active_db_profile }}</strong>
    </p>

    <div id="db-test-result" style="display: none; margin-bottom: 16px; padding: 10px 14px; border-radius: 8px; font-size: 13px;"></div>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
        {% for p in db_profiles %}
        <label style="display: flex; align-items: center; gap: 10px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;">
            <input type="radio" name="db_profile" value="{{ p.name }}" {{ 'checked' if p.name == active_db_profile }} style="accent-color: var(--accent);">
            <div>
                <div style="font-size: 14px; font-weight: 500;">
                    {{ p.label }}
                    {% if p.name == active_db_profile %}<span style="font-size: 11px; font-weight: 400; color: #2e7d32;">— подключено</span>{% endif %}
                </div>
                <div style="font-size: 12px; color: var(--text-hint);">{{ p.host }}:{{ p.port }} / {{ p.dbname }}</div>
            </div>
        </label>
        {% endfor %}
    </div>

    <div style="display: flex; gap: 10px;">
        <button type="button" onclick="testDbConnection()" class="btn" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border);">
            Проверить подключение
        </button>
        <button type="button" onclick="connectDb()" class="btn btn-primary">
            Подключиться
        </button>
    </div>
</div>

<div class="card" style="max-width: 600px;">
    <h3 style="margin-bottom: 24px; font-size: 16px; font-weight: 500;">Тема оформления</h3>

    <div style="display: flex; gap: 16px;">
        <button onclick="setTheme('light')" id="btn-theme-light" class="theme-card">
            <div style="width: 48px; height: 48px; border-radius: 12px; background: #f5f5f5; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#f9a825">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
            </div>
            <span class="theme-label" id="label-light">Светлая</span>
        </button>

        <button onclick="setTheme('dark')" id="btn-theme-dark" class="theme-card">
            <div style="width: 48px; height: 48px; border-radius: 12px; background: #1e1e1e; border: 2px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#90caf9">
                    <path d="M9 2c-1.05 0-2.05.16-3 .46 4.06 1.27 7 5.06 7 9.54 0 4.48-2.94 8.27-7 9.54.95.3 1.95.46 3 .46 5.52 0 10-4.48 10-10S14.52 2 9 2z"/>
                </svg>
            </div>
            <span class="theme-label" id="label-dark">Тёмная</span>
        </button>
    </div>
</div>

<style>
    .theme-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 20px 32px;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-secondary);
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .theme-card:hover {
        border-color: var(--accent);
        background: var(--accent-light);
    }
    .theme-card.active {
        border-color: var(--accent);
        background: var(--accent-light);
    }
    .theme-label {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
    }
</style>

<script>
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        updateThemeButtons(theme);
    }

    function updateThemeButtons(theme) {
        document.getElementById('btn-theme-light').classList.toggle('active', theme === 'light');
        document.getElementById('btn-theme-dark').classList.toggle('active', theme === 'dark');
    }

    (function() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        updateThemeButtons(saved);
    })();

    function getSelectedProfile() {
        const checked = document.querySelector('input[name="db_profile"]:checked');
        return checked ? checked.value : null;
    }

    function showDbResult(ok, message) {
        const box = document.getElementById('db-test-result');
        box.style.display = 'block';
        box.style.background = ok ? '#e8f5e9' : '#ffebee';
        box.style.color = ok ? '#2e7d32' : '#c62828';
        box.textContent = message;
    }

    function buildDbFormData(profile) {
        const formData = new FormData();
        formData.append('profile', profile);
        appendCsrfToken(formData);
        return formData;
    }

    function testDbConnection() {
        const profile = getSelectedProfile();
        if (!profile) return;

        fetch('/settings/db/test-connection', { method: 'POST', body: buildDbFormData(profile) })
            .then(resp => resp.json())
            .then(data => showDbResult(data.status === 'ok', data.message))
            .catch(err => showDbResult(false, 'Ошибка запроса: ' + err));
    }

    function connectDb() {
        const profile = getSelectedProfile();
        if (!profile) return;

        fetch('/settings/db/connect', { method: 'POST', body: buildDbFormData(profile) })
            .then(resp => resp.json())
            .then(data => {
                showDbResult(data.status === 'ok', data.message);
                if (data.status === 'ok') {
                    if (data.relogin) {
                        setTimeout(() => { window.location = '/auth/login'; }, 600);
                    } else {
                        setTimeout(() => location.reload(), 600);
                    }
                }
            })
            .catch(err => showDbResult(false, 'Ошибка запроса: ' + err));
    }
</script>
{% endblock %}
